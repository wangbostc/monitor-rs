language = "C"
header = "// Auto-generated by cbindgen — do not edit by hand."
include_guard = "MONITOR_RS_H"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]
cpp_compat = true
documentation = true
style = "type"

[export]
prefix = ""
include = ["MrsHandle", "MrsSample", "MrsProcInfo"]
exclude = ["IOPSCopyPowerSourcesInfo", "IOPSCopyPowerSourcesList", "IOPSGetPowerSourceDescription"]

[export.rename]
"c_char" = "char"
"c_int" = "int"

[parse]
parse_deps = false

[defines]
"target_os = macos" = "__APPLE__"
